
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur 403 - Page Bloquée</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        /* Réinitialisation de base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0d0d0d; /* Fond noir profond */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            perspective: 1000px; /* Nécessaire pour l'effet 3D */
        }

        .container {
            text-align: center;
            padding: 40px;
            transition: transform 0.1s ease-out; /* Fluidité du mouvement de la souris */
            transform-style: preserve-3d;
        }

        /* Titre 403 avec lueur rouge */
        h1 {
            font-size: 10rem;
            font-weight: 700;
            color: #ff2a2a; /* Rouge vif */
            margin-bottom: -10px;
            text-shadow: 0px 0px 20px rgba(255, 42, 42, 0.6), 
                         0px 0px 40px rgba(255, 42, 42, 0.3);
            transform: translateZ(50px); /* Fait ressortir le texte en 3D */
        }

        /* Sous-titre blanc */
        h2 {
            font-size: 2.5rem;
            font-weight: 500;
            margin-bottom: 20px;
            letter-spacing: 1px;
            transform: translateZ(30px);
        }

        /* Texte descriptif */
        p {
            font-size: 1.1rem;
            font-weight: 300;
            color: #a0a0a0; /* Gris clair pour contraster avec le blanc pur */
            margin-bottom: 40px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
            transform: translateZ(20px);
        }

        /* Bouton rouge élégant */
        .btn {
            display: inline-block;
            padding: 15px 35px;
            font-size: 1rem;
            color: #ffffff;
            text-decoration: none;
            border: 2px solid #ff2a2a;
            border-radius: 50px;
            background: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
            transition: all 0.3s ease;
            transform: translateZ(40px);
        }

        .btn:hover {
            background-color: #ff2a2a;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 42, 42, 0.5);
            transform: translateZ(40px) scale(1.05); /* Effet de grossissement au survol */
        }
        
        /* Petites particules en arričre-plan (Optionnel) */
        .background-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(255,42,42,0.05) 0%, rgba(13,13,13,0) 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }

        /* Responsive design pour mobile */
        @media (max-width: 768px) {
            h1 { font-size: 6rem; }
            h2 { font-size: 1.8rem; }
            p { font-size: 0.9rem; padding: 0 20px; }
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="container" id="parallax-container">
        <h1>403</h1>
        <h2>Oups ! Page bloquée.</h2>
        <!-- <p>Il semblerait que vous ayez navigué hors des sentiers battus. La page que vous recherchez n'existe pas ou a été déplacée.</p> -->
        <p>Cette page n'existe pas ou elle est momentanément bloquée</p>
        <a style="display: none;" href="/" class="btn">Retour ŕ l'accueil</a>
    </div>

    <script>
        // Effet de parallaxe au mouvement de la souris
        document.addEventListener("mousemove", function(e) {
            const container = document.getElementById("parallax-container");
            const xAxis = (window.innerWidth / 2 - e.pageX) / 40; // Sensibilité horizontale
            const yAxis = (window.innerHeight / 2 - e.pageY) / 40; // Sensibilité verticale
            
            // Applique la rotation pour créer l'effet 3D
            container.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Remet le bloc ŕ plat quand la souris quitte l'écran
        document.addEventListener("mouseleave", function() {
            const container = document.getElementById("parallax-container");
            container.style.transition = "transform 0.5s ease";
            container.style.transform = `rotateY(0deg) rotateX(0deg)`;
            
            // Restaure la transition rapide aprčs l'animation de retour
            setTimeout(() => {
                container.style.transition = "transform 0.1s ease-out";
            }, 500);
        });
    </script>

</body>
</html>
