<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | BL Alliance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #D32F2F; --bg: #0a0a0a; --card: #141414; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        /* Header */
        header { background: #141414; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .logo-container img { height: 40px; margin-right: 10px; }
        .brand-name { color: var(--primary); font-weight: bold; font-size: 20px; }
        .btn-back-circle { background: #333; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .btn-back-circle:hover { background: var(--primary); }

        .container { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .feedback-header { text-align: center; margin-bottom: 30px; }
        .feedback-header h1 { font-size: 28px; margin-bottom: 10px; }
        .feedback-header p { color: #888; font-size: 14px; }

        .feedback-card { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #222; }
        
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: 500; font-size: 15px; }

        /* Star Rating */
        .star-rating { display: flex; flex-direction: row-reverse; justify-content: center; gap: 10px; margin-top: 10px; }
        .star-rating input { display: none; }
        .star-rating label { font-size: 30px; color: #333; cursor: pointer; transition: 0.2s; }
        .star-rating input:checked ~ label { color: #FFD700; }
        .star-rating label:hover, .star-rating label:hover ~ label { color: #FFD700; }

        /* Checkbox Group */
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .checkbox-item { display: flex; align-items: center; gap: 10px; font-size: 14px; background: #1a1a1a; padding: 10px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; }
        .checkbox-item:hover { border-color: var(--primary); }
        .checkbox-item input { accent-color: var(--primary); }

        /* Select & Textarea */
        select, textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; font-family: inherit; box-sizing: border-box; }
        textarea { height: 120px; resize: none; }
        select:focus, textarea:focus { border-color: var(--primary); outline: none; }

        .btn-submit { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .btn-submit:hover { background: #b71c1c; transform: translateY(-2px); }

        .anonymous-switch { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 13px; color: #888; }
        .anonymous-switch input { accent-color: var(--primary); }

        footer { text-align: center; padding: 30px; color: #555; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <a href="dashboard.html" style="display: flex; align-items: center; text-decoration: none;">
                <img src="assets/logo2.png" alt="BL Alliance">
                <span class="brand-name">BL Alliance</span>
            </a>
        </div>
        <div class="header-actions">
            <a href="dashboard.html" class="btn-back-link">
                <button class="btn-back-circle" title="Retour au Dashboard">
                    <i class="fas fa-angles-left"></i>
                </button>
            </a>
        </div>
    </header>

    <div class="container">
        <div class="feedback-header">
            <h1>Votre Expérience</h1>
            <p>Aidez-nous à parfaire l'excellence de notre service de courtage.</p>
        </div>

        <form class="feedback-card" id="feedbackForm">
            <div class="form-group" style="text-align: center;">
                <label>Note globale de l'agence</label>
                <div class="star-rating">
                    <input type="radio" id="star5" name="rating" value="5"><label for="star5" title="Excellent"><i class="fas fa-star"></i></label>
                    <input type="radio" id="star4" name="rating" value="4"><label for="star4" title="Très bon"><i class="fas fa-star"></i></label>
                    <input type="radio" id="star3" name="rating" value="3"><label for="star3" title="Moyen"><i class="fas fa-star"></i></label>
                    <input type="radio" id="star2" name="rating" value="2"><label for="star2" title="Passable"><i class="fas fa-star"></i></label>
                    <input type="radio" id="star1" name="rating" value="1"><label for="star1" title="Insatisfaisant"><i class="fas fa-star"></i></label>
                </div>
            </div>

            <div class="form-group">
                <label>Qu'avez-vous le plus apprécié ?</label>
                <div class="checkbox-group">
                    <label class="checkbox-item"><input type="checkbox" name="appreciations" value="La discrétion"> La discrétion</label>
                    <label class="checkbox-item"><input type="checkbox" name="appreciations" value="Qualité des profils"> Qualité des profils</label>
                    <label class="checkbox-item"><input type="checkbox" name="appreciations" value="Design de l'appli"> Design de l'appli</label>
                    <label class="checkbox-item"><input type="checkbox" name="appreciations" value="Rapidité du matching"> Rapidité du matching</label>
                    <label class="checkbox-item"><input type="checkbox" name="appreciations" value="Accompagnement"> Accompagnement</label>
                </div>
            </div>

            <div class="form-group">
                <label for="subject">Sujet de votre retour</label>
                <select id="subject" name="subject">
                    <option value="general">Avis général</option>
                    <option value="tech">Problème technique / Application</option>
                    <option value="success">Témoignage de réussite</option>
                    <option value="suggestion">Suggestion d'amélioration</option>
                    <option value="complaint">Réclamation</option>
                </select>
            </div>

            <div class="form-group">
                <label for="comment">Votre message</label>
                <textarea id="comment" name="comment" placeholder="Partagez votre expérience avec nous..."></textarea>
            </div>

            <button type="submit" class="btn-submit" id="btnSubmit">Envoyer mon témoignage</button>

            <div class="anonymous-switch">
                <input type="checkbox" id="anon">
                <label for="anon" style="margin:0; cursor:pointer;">Publier mon témoignage de façon anonyme</label>
            </div>
        </form>
    </div>

    <footer class="social-footer">
        <p>© 2026 BL Alliance — Agence de Courtage Matrimonial. Tous droits réservés.</p>
    </footer>

    <script>
        const feedbackForm = document.getElementById('feedbackForm');
        
        feedbackForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.innerText = "Envoi en cours...";
            btnSubmit.disabled = true;

            // 1. Préparation du FormData (Format multipart/form-data pour request.form)
            const formData = new FormData();
            
            // Récupération de l'ID utilisateur (depuis localStorage)
            formData.append('user_id', localStorage.getItem('user_id') || "");

            // Récupération de la note (radio bouton)
            const selectedRating = document.querySelector('input[name="rating"]:checked');
            if (!selectedRating) {
                alert("Veuillez donner une note (étoiles).");
                btnSubmit.innerText = "Envoyer mon témoignage";
                btnSubmit.disabled = false;
                return;
            }
            formData.append('rating', selectedRating.value);

            // Récupération du sujet et commentaire
            formData.append('subject', document.getElementById('subject').value);
            formData.append('comment', document.getElementById('comment').value);
            
            // Cas particulier : is_anonymous (on envoie "true" ou "false" en string pour Flask)
            formData.append('is_anonymous', document.getElementById('anon').checked ? 'true' : 'false');

            // Récupération des checkboxes MULTIPLES (appréciations)
            const checks = document.querySelectorAll('input[name="appreciations"]:checked');
            checks.forEach(cb => {
                formData.append('appreciations', cb.value); // Flask captera cela avec .getlist('appreciations')
            });

            try {
                const response = await fetch('https://bl-alliance-api.onrender.com/send_feedback', {
                    method: 'POST',
                    body: formData // On envoie le FormData directement
                });

                const result = await response.json();

                if (response.ok) {
                    alert(result.message);
                    window.location.href = "dashboard.html";
                } else {
                    alert("Erreur : " + result.error);
                }
            } catch (error) {
                console.error("Erreur réseau:", error);
                alert("Impossible de contacter le serveur.");
            } finally {
                btnSubmit.innerText = "Envoyer mon témoignage";
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
