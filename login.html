<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | BL Alliance</title>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .main-card { background-color: #141414; padding: 25px; border-radius: 12px; width: 100%; max-width: 380px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo-container { text-align: center; margin-bottom: 20px; }
        .logo-container img { max-width: 150px; height: auto; }
        h2 { color: #D32F2F; margin: 0 0 20px 0; text-align: center; font-size: 1.5rem; }
        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; font-size: 13px; color: #bbb; margin-bottom: 5px; font-weight: 500; }
        input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; box-sizing: border-box; border-radius: 6px; font-size: 14px; transition: border 0.3s; }
        input:focus { border-color: #D32F2F; outline: none; }
        .pass-wrapper { position: relative; }
        .eye-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; font-size: 18px; }
        button { width: 100%; padding: 14px; background: #D32F2F; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 6px; font-size: 16px; transition: 0.3s; }
        button:hover { background: #b71c1c; }

        button:active { transform: scale(0.98); opacity: 0.9; }
        button:disabled { background: #333; cursor: not-allowed; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 0.8s linear infinite; margin-left: 10px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #message { margin-top: 15px; font-size: 14px; text-align: center; min-height: 20px; }
        /* Style Modal Identique au Signup */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 15px; box-sizing: border-box; }
        .modal-content { background: #1a1a1a; padding: 25px; border-radius: 12px; width: 100%; max-width: 350px; border: 1px solid #333; text-align: center; }
        .modal-content h3 { color: #D32F2F; margin-top: 0; }
        .modal-content p { font-size: 14px; line-height: 1.5; color: #ccc; margin-bottom: 20px; }
        @media (max-width: 480px) { .main-card { padding: 20px; } }
    </style>
    </head>
<body>

    <script>
        // --- LOGIQUE DE SESSION PERMANENTE ---
        // Si l'utilisateur est déjà connecté, on l'envoie direct au dashboard
        if (localStorage.getItem('user_id') && localStorage.getItem('token')) {
            window.location.href = "dashboard.html";
        }
    </script>

    <div class="main-card">
        <div class="logo-container">
            <img src="assets/logo2.png" alt="BL Alliance Logo">
        </div>
        <h2>Connexion</h2>
        
        <div class="form-group">
            <label for="phone">Numéro de téléphone</label>
            <input type="text" id="phone" placeholder="Ex: 0820000000">
        </div>

        <div class="form-group">
            <label for="password">Mot de passe</label>
            <div class="pass-wrapper">
                <input type="password" id="password" placeholder="Votre mot de passe">
                <span class="eye-icon" onclick="togglePass()">👁️</span>
            </div>
        </div>

        <button id="btn-login" onclick="handleLogin()">
            <span id="btn-text">Se connecter</span>
            <div id="loader" class="spinner" style="display:none;"></div>
        </button>

        <div id="message"></div>
        
        <p style="text-align: center; font-size: 12px; margin-top: 20px;">
            Pas encore de compte ? <a href="signup.html" style="color: #D32F2F; text-decoration: none;">S'inscrire</a>
        </p>
        <p style="text-align: center; font-size: 12px; margin-top: 10px;">
            <a href="index.html" style="color: #888; text-decoration: none;">← Retour</a>
        </p>
    </div>

    <div id="modal-error" class="modal-overlay">
        <div class="modal-content">
            <h3>Échec de connexion</h3>
            <p>Numéro ou mot de passe incorrect. Veuillez vérifier vos accès.</p>
            <button onclick="closeModal()">Réessayer</button>
        </div>
    </div>
<script>
        // -- DEBUT DU BLOCK À AJOUTER/MODIFIER --
        function togglePass() {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function openModal() { document.getElementById('modal-error').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-error').style.display = 'none'; }

        async function handleLogin() {
            const phone = document.getElementById('phone').value;
            // -- DEBUT DU BLOCK À MODIFIER --
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('message');
            const btn = document.getElementById('btn-login');
            const btnText = document.getElementById('btn-text');
            const loader = document.getElementById('loader');

            if(!phone || !password) {
                msgDiv.style.color = "orange";
                msgDiv.innerText = "Remplissez tous les champs";
                return;
            }

            // État de chargement
            btn.disabled = true;
            btnText.innerText = "Veuillez patienter...";
            loader.style.display = "inline-block";
            msgDiv.innerText = "";

            try {
                const response = await fetch('https://bl-alliance-api.onrender.com/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });

                const result = await response.json();

                if (response.ok) {
                    localStorage.setItem('user_id', result.session.user_id);
                    localStorage.setItem('token', result.session.access_token);
                    localStorage.setItem('is_paid', result.session.is_paid);

                    msgDiv.style.color = "lightgreen";
                    msgDiv.innerText = "Succès ! Redirection...";
                    setTimeout(() => { window.location.href = "dashboard.html"; }, 800);
                } else {
                    btn.disabled = false;
                    btnText.innerText = "Se connecter";
                    loader.style.display = "none";
                    openModal(); 
                }
            } catch (error) {
                btn.disabled = false;
                btnText.innerText = "Se connecter";
                loader.style.display = "none";
                msgDiv.style.color = "#ff4444";
                msgDiv.innerText = "Erreur de connexion au serveur";
            }
            // -- FIN DU BLOCK À MODIFIER --
        }
    </script>
</body>
</html>
