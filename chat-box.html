<!DOCTYPE html>
<html lang="fr">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Correspondants | BL Alliance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* -- DEBUT DU BLOCK À MODIFIER -- */
        :root {
            --primary: #D32F2F;
            --primary-light: #ff4d4d;
            --bg-dark: #0d0d0d;
            --card-bg: #141414;
            --text: #ffffff;
            --text-muted: #b0b0b0;
            --border: #222;
        }

        body { background: var(--bg-dark); color: var(--text); font-family: 'Jost', sans-serif; margin: 0; }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo-container img { height: 35px; margin-right: 10px; }
        .brand-name { font-size: 1.1rem; font-weight: bold; color: var(--primary-light); }

        .btn-back-circle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-back-circle:hover { background: var(--primary); border-color: var(--primary); transform: translateX(-3px); }

        /* Grille de Cards Responsive */
        .contact-list { 
            display: grid; 
            padding: 20px 5%; 
            gap: 15px;
            grid-template-columns: repeat(2, 1fr); /* Mobile: 2 colonnes */
        }

        @media (min-width: 600px) { .contact-list { grid-template-columns: repeat(3, 1fr); } } /* Tablette: 3 */
        @media (min-width: 1024px) { .contact-list { grid-template-columns: repeat(5, 1fr); } } /* PC: 5 */
        @media (min-width: 1440px) { .contact-list { grid-template-columns: repeat(6, 1fr); } } /* Large PC: 6 */

        .contact-card { 
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .contact-card:hover { 
            transform: translateY(-5px);
            border-color: var(--primary);
            background: #1a1a1a;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .avatar-wrapper { position: relative; margin-bottom: 15px; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #333; transition: 0.3s; }
        .contact-card:hover .avatar { border-color: var(--primary); transform: scale(1.05); }
        .avatar.support { border-color: var(--primary); }
        
        .info { width: 100%; }
        .info h4 { 
            margin: 0; 
            font-size: 14px; 
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }
        
        .status-badge { 
            font-size: 10px; 
            padding: 3px 10px; 
            border-radius: 20px; 
            margin-top: 10px;
            display: inline-block;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .status-active { background: rgba(27, 94, 32, 0.2); color: #4caf50; border: 1px solid #4caf50; }
        .status-pending { background: rgba(255, 152, 0, 0.1); color: #ff9800; border: 1px solid #ff9800; }

        .unread-indicator {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--primary);
            color: white;
            font-size: 11px;
            font-weight: bold;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(211, 47, 47, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        /* -- FIN DU BLOCK À MODIFIER -- */

        .state-container {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            color: var(--text-muted);
            width: 100%;
        }

        .state-container i {
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--primary);
            opacity: 0.5;
        }

        .state-container p {
            font-size: 1.1rem;
            margin: 10px 0;
        }



    </style>
</head>
<body>
<header>
    <div class="logo-container">
        <a href="dashboard.html" style="display: flex; align-items: center; text-decoration: none;">
            <img src="assets/logo2.png" alt="BL Alliance">
            <span class="brand-name">BL Alliance</span>
        </a>
    </div>
    <div class="header-actions">
        <a href="dashboard.html" class="btn-back-link">
            <button class="btn-back-circle" title="Retour au Dashboard">
                <i class="fas fa-angles-left"></i>
            </button>
        </a>
    </div>
</header>
<div class="contact-list" id="contactList">
    <!-- <div style="text-align: center; padding: 50px; color: #555;">Chargement de vos liens...</div> -->
    <div class="state-container">
        <i class="fas fa-spinner fa-spin"></i>
        <p>Chargement de vos liens...</p>
    </div>
</div>

<script>

    async function loadContacts(retries = 2) {
        const uid = localStorage.getItem('user_id');
        const SUPPORT_ID = "4a4c3b14-f7cc-435c-9a13-672d4f25be57";
        const listDiv = document.getElementById('contactList');

        if (!uid) return;

        try {
            // Ajout d'un timeout de 10 secondes pour éviter l'attente infinie
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);

            const response = await fetch(`https://bl-alliance-api.onrender.com/get_my_contacts?user_id=${uid}`, {
                signal: controller.signal
            });
            
            clearTimeout(timeoutId);
            if (!response.ok) throw new Error("Erreur serveur");

            const contacts = await response.json();
            listDiv.innerHTML = "";

            if (contacts.length === 0) {
                listDiv.innerHTML = `
                    <div class="state-container">
                        <i class="fas fa-comment-slash"></i>
                        <p>Aucune conversation pour le moment.</p>
                    </div>`;
                return;
            }

            // -- DEBUT DU BLOCK À MODIFIER --
            // Construction du HTML
            let finalHtml = "";
            contacts.forEach(c => {
                const isSupport = c.id === SUPPORT_ID;
                const statusClass = c.status_connection === 'active' ? 'status-active' : 'status-pending';
                const statusLabel = c.status_connection === 'pending' ? 'Attente' : 'Actif';
                const unreadBadge = c.unread_count > 0 ? `<div class="unread-indicator">${c.unread_count}</div>` : "";

                finalHtml += `
                    <a href="chat-box-2.html?contact_id=${c.id}" class="contact-card">
                        ${unreadBadge}
                        <div class="avatar-wrapper">
                            <img src="${c.url_profil_img}" class="avatar ${isSupport ? 'support' : ''}" alt="Avatar">
                            ${isSupport ? '<i class="fas fa-certificate" style="position:absolute; bottom:2px; right:2px; color:#D32F2F; font-size:14px; background:white; border-radius:50%; padding:1px;"></i>' : ''}
                        </div>
                        <div class="info">
                            <h4>${c.full_name}</h4>
                            <span class="status-badge ${statusClass}">${statusLabel}</span>
                        </div>
                    </a>`;
            });
            // -- FIN DU BLOCK À MODIFIER --
            listDiv.innerHTML = finalHtml;

        } catch (e) {
            if (retries > 0) {
                console.log("Tentative de reconnexion...");
                setTimeout(() => loadContacts(retries - 1), 1500);
            } else {
                listDiv.innerHTML = `
                    <div class="state-container">
                        <i class="fas fa-wifi"></i>
                        <p>Connexion lente...</p>
                        <a href='#' onclick='location.reload()' style='color:var(--primary); text-decoration:underline; font-weight:bold;'>Réessayer</a>
                    </div>`;
            }
        }
    }

    document.addEventListener('DOMContentLoaded', loadContacts);

    // Détection du retour arrière forcé (Back/Forward Cache)
    window.onpageshow = function(event) {
        if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
            window.location.reload();
        }
    };
    
</script>

</body>
</html>
