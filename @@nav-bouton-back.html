<!DOCTYPE html>
<html>
<head>
	<title></title>
	<style type="text/css">
		


        :root {
            --primary: #ff4d4d;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text: #ffffff;
            --text-muted: #b0b0b0;
            --border: #333;
        }


        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-container img { height: 40px; margin-right: 10px; }
        .brand-name { font-size: 1.2rem; font-weight: bold; color: var(--primary); }

        .btn-back-circle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-back-circle:hover { background: var(--primary); }


	</style>

</head>
<body>
    <header>
        <div class="logo-container">
            <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
                <img src="assets/logo2.png" alt="BL Alliance">
                <span class="brand-name">BL Alliance</span>
            </a>
        </div>
        <div class="header-actions">
            <a href="dashboard.html" class="btn-back-link">
                <button class="btn-back-circle" title="Retour au Dashboard">
                    <i class="fas fa-angles-left"></i>
                </button>
            </a>
        </div>
    </header>


</body>
</html>
