/* --- RESET & VARIABLES --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
}

:root {
    --bg-dark: #1a1a1a;
    --bg-card: #000000;
    --primary-red: #d32f2f;
    --accent-blue: #3b82f6;
    --text-main: #ffffff;
    --text-dim: #b0b0b0;
    --border: #333333;
}

/* --- SCROLLBAR PROFESSIONNELLE --- */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary-red); }

body {
    background-color: var(--bg-dark) !important;
    color: var(--text-main);
    line-height: 1.6;
}

/* --- NAVIGATION & LOGO --- */
nav {
    background: var(--bg-card) !important;
    padding: 15px 20px !important;
    border-bottom: 2px solid var(--primary-red) !important;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1000;
}

nav a {
    color: var(--text-main) !important;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
}

/* Placement du logo2.png */
nav::after {
    content: "";
    width: 60px;
    height: 40px;
    background: url('logo2.png') no-repeat center;
    background-size: contain;
}

nav button {
    background: #222;
    color: #fff;
    border: 1px solid #444;
    padding: 8px 15px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.8rem;
}

/* --- CONTENEUR PRINCIPAL --- */
.container {
    max-width: 900px !important;
    margin: 20px auto !important; /* Mobile margin */
    background: var(--bg-card) !important;
    padding: 25px !important;
    border-radius: 10px !important;
    border: 1px solid var(--border);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
}

h2 {
    font-size: 1.4rem;
    color: var(--accent-blue);
    margin-bottom: 15px;
    letter-spacing: 1px;
}

/* --- SECTION MOTIF (FOCUS) --- */
.reason-box {
    background: #0a0a0a !important;
    border-left: 5px solid var(--primary-red) !important;
    padding: 20px !important;
    margin: 25px 0 !important;
    border-radius: 4px;
}

.reason-box h3 {
    color: var(--primary-red) !important;
    font-size: 1.2rem;
    text-transform: uppercase;
}

/* --- GRILLE DE PROFILS (RESPONSIVE) --- */
.grid {
    display: grid !important;
    grid-template-columns: 1fr !important; /* Mobile: 1 colonne */
    gap: 15px !important;
}

.profile-card {
    border: 1px solid var(--border) !important;
    padding: 20px !important;
    background: #080808 !important;
    border-radius: 8px !important;
    text-align: center;
}

/* --- CALIBRATION IMAGES (NO STRETCH) --- */
.avatar {
    width: 80px !important;
    height: 80px !important;
    border-radius: 50% !important;
    object-fit: cover !important; /* GARANTIT LE NON-ÉTIREMENT */
    border: 2px solid var(--border) !important;
    margin: 15px auto !important;
    display: block;
}

/* --- TYPOGRAPHIE ADMIN --- */
.label {
    color: var(--accent-blue) !important;
    text-transform: uppercase;
    font-size: 0.7rem !important;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
}

p {
    font-size: 0.95rem;
    color: #eee;
}

strong {
    font-size: 1.1rem;
    letter-spacing: 1px;
}

/* --- RESPONSIVITÉ AVANCÉE --- */

/* TABLETTE (768px+) */
@media (min-width: 768px) {
    .container {
        margin: 40px auto !important;
        padding: 40px !important;
    }

    .grid {
        grid-template-columns: 1fr 1fr !important; /* 2 colonnes sur tablette/PC */
        gap: 25px !important;
    }

    h2 {
        font-size: 1.8rem;
    }
}

/* PC LARGE (1024px+) */
@media (min-width: 1024px) {
    .container {
        max-width: 950px !important;
    }

    .profile-card:hover {
        border-color: var(--accent-blue) !important;
        transition: 0.3s ease;
    }
}

    </style>
</head>
<body>

    <nav>
        <a href="admin-reports.html" style="text-decoration:none; color:#3498db; font-weight:bold;">⬅ Retour</a>
        <!-- <button onclick="location.reload()">🔄 Rafraîchir</button> -->
    </nav>

    <div class="container" id="detailContainer">
        <p>Chargement des détails...</p>
    </div>

    <script>
        const reportId = new URLSearchParams(window.location.search).get('id');

        window.onload = async () => {
            if (!reportId) return;
            try {
                const res = await fetch(`https://bl-alliance-api.onrender.com/admin/get_report_details?id=${reportId}`);
                const data = await res.json();
                renderDetails(data);
            } catch (e) { console.error(e); }
        };

        function renderDetails(data) {
            const { report, reporter, reported } = data;
            const container = document.getElementById('detailContainer');

            container.innerHTML = `
                <h2>Signalement #${report.id}</h2>
                <span class="label">Date du signalement</span>
                <p>${new Date(report.created_at).toLocaleString('fr-FR')}</p>

                <div class="reason-box">
                    <span class="label" style="color:#c0392b">MOTIF DU SIGNALEMENT</span>
                    <h3 style="margin:5px 0">${report.reason}</h3>
                    <p>${report.details || "Aucun détail supplémentaire fourni."}</p>
                </div>

                <div class="grid">
                    <div class="profile-card">
                        <span class="label">AUTEUR (REPORTER)</span>
                        <img src="${reporter.url_profil_img}" class="avatar">
                        <p><b>${reporter.full_name}</b></p>
                        <p style="font-size:0.8em; color:#888">ID: ${reporter.id}</p>
                    </div>
                    <div class="profile-card">
                        <span class="label">SIGNALÉ (REPORTED)</span>
                        <img src="${reported.url_profil_img}" class="avatar">
                        <p><b>${reported.full_name}</b></p>
                        <p style="font-size:0.8em; color:#888">ID: ${reported.id}</p>
                    </div>
                </div>

                <div style="margin-top:30px; border-top:1px solid #eee; padding-top:20px; display: none;">
                    <span class="label">STATUT ACTUEL</span>
                    <strong style="color:#f39c12">${report.status.toUpperCase()}</strong>
                </div>
            `;
        }
    </script>
</body>
</html>
