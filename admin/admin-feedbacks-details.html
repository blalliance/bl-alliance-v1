/* --- CONFIGURATION GLOBALE & RESET --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
}

:root {
    --bg-dark: #1a1a1a;
    --bg-card: #000000;
    --primary-red: #d32f2f;
    --accent-blue: #3b82f6;
    --text-main: #ffffff;
    --text-dim: #b0b0b0;
    --border: #333333;
}

/* --- SCROLLBAR PERSONNALISÉE --- */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; border: 2px solid var(--bg-dark); }
::-webkit-scrollbar-thumb:hover { background: var(--primary-red); }

body {
    background-color: var(--bg-dark) !important;
    color: var(--text-main);
    line-height: 1.6;
    min-height: 100vh;
}

/* --- NAVIGATION --- */
nav {
    background: var(--bg-card) !important;
    padding: 15px 20px !important;
    border-bottom: 2px solid var(--primary-red) !important;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1000;
}

nav a {
    color: var(--text-main) !important;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
    transition: color 0.3s;
}

nav a:hover { color: var(--primary-red); }

/* Logo signature à droite */
nav::after {
    content: "";
    width: 50px;
    height: 35px;
    background: url('logo2.png') no-repeat center;
    background-size: contain;
}

nav button {
    background: #222;
    color: #fff;
    border: 1px solid #444;
    padding: 8px 15px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
}

/* --- CONTENEUR DE DÉTAILS (CALIBRÉ) --- */
.container {
    max-width: 800px !important;
    margin: 20px auto !important; /* Mobile */
    background: var(--bg-card) !important;
    padding: 25px !important;
    border-radius: 8px !important;
    border: 1px solid var(--border);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6) !important;
}

/* --- HEADER --- */
.header {
    border-bottom: 1px solid var(--border) !important;
    padding-bottom: 20px !important;
    margin-bottom: 25px !important;
    display: flex;
    flex-direction: column; /* Mobile First */
    gap: 15px;
}

.header h2 {
    font-size: 1.5rem;
    color: var(--text-main);
}

/* --- TAGS (APPRÉCIATIONS) --- */
.tag {
    background: transparent !important;
    color: var(--accent-blue) !important;
    border: 1px solid var(--accent-blue) !important;
    padding: 5px 12px !important;
    border-radius: 4px !important;
    font-size: 0.8em !important;
    margin-right: 8px;
    margin-bottom: 8px;
    display: inline-block;
    text-transform: uppercase;
    font-weight: bold;
}

/* --- ZONE DE COMMENTAIRE --- */
.comment-box {
    background: #0a0a0a !important;
    padding: 25px !important;
    border-radius: 6px !important;
    font-style: italic !important;
    color: #eee !important;
    line-height: 1.8 !important;
    margin: 15px 0 30px 0 !important;
    border-left: 4px solid var(--primary-red) !important;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
}

/* --- CARTE UTILISATEUR & AVATAR --- */
.user-mini-card {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 20px !important;
    background: #080808 !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
}

.avatar {
    width: 65px !important;
    height: 65px !important;
    border-radius: 50% !important;
    object-fit: cover !important; /* EMPÊCHE LE STRETCH */
    border: 2px solid var(--border) !important;
    background: #111;
}

/* LABELS --- */
label {
    display: block;
    font-weight: bold;
    color: var(--text-dim) !important;
    font-size: 0.75rem !important;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 5px;
}

/* --- RESPONSIVITÉ AVANCÉE --- */

/* TABLETTE (768px+) */
@media (min-width: 768px) {
    .container {
        margin: 40px auto !important;
        padding: 40px !important;
    }

    .header {
        flex-direction: row; /* Aligné sur PC/Tablette */
        justify-content: space-between !important;
        align-items: center !important;
    }

    .header h2 {
        font-size: 1.8rem;
    }
}

/* PC LARGE (1024px+) */
@media (min-width: 1024px) {
    .container {
        max-width: 850px !important;
    }
    
    .comment-box {
        font-size: 1.1rem !important;
    }
}

/* ÉTATS CHARGEMENT */
#fbContent p {
    text-align: center;
    color: var(--accent-blue);
    font-weight: bold;
    letter-spacing: 2px;
}

    </style>
</head>
<body>

    <nav>
        <a href="admin-feedbacks.html" style="text-decoration:none; color:#16a085; font-weight:bold;">⬅ Retour</a>
        <!-- <button onclick="location.reload()" style="cursor:pointer;">🔄 Rafraîchir</button> -->
    </nav>

    <div class="container" id="fbContent">
        <p>Récupération des données...</p>
    </div>

    <script>
        const fbId = new URLSearchParams(window.location.search).get('id');

        window.onload = async () => {
            if (!fbId) return;
            const res = await fetch(`https://bl-alliance-api.onrender.com/admin/get_feedback_details?id=${fbId}`);
            const data = await res.json();
            renderDetails(data);
        };

        function renderDetails(data) {
            const { feedback, user } = data;
            const cont = document.getElementById('fbContent');
            const stars = "★".repeat(feedback.rating) + "☆".repeat(5 - feedback.rating);
            
            let userHtml = `<div class="user-mini-card"><i>Utilisateur Anonyme ou Profil supprimé</i></div>`;
            if (user && !feedback.is_anonymous) {
                userHtml = `
                <div class="user-mini-card">
                    <img src="${user.url_profil_img}" class="avatar">
                    <div>
                        <div style="font-weight:bold">${user.full_name}</div>
                        <div style="font-size:0.8em; color:#888">ID: ${user.id}</div>
                    </div>
                </div>`;
            }

            const appreciationsHtml = feedback.appreciations ? 
                feedback.appreciations.map(a => `<span class="tag">${a}</span>`).join('') : '';

            cont.innerHTML = `
                <div class="header">
                    <div>
                        <h2 style="margin:0">${feedback.subject || 'Feedback Sans Titre'}</h2>
                        <div style="color:#f1c40f; font-size:1.3em; margin-top:5px;">${stars}</div>
                    </div>
                    <div style="text-align:right; color:#888; font-size:0.9em;">
                        ${new Date(feedback.created_at).toLocaleString('fr-FR')}
                    </div>
                </div>

                <label style="font-weight:bold; color:#7f8c8d; font-size:0.8em;">APPRÉCIATIONS CHOISIES :</label>
                <div style="margin: 10px 0 25px 0;">${appreciationsHtml || 'Aucune'}</div>

                <label style="font-weight:bold; color:#7f8c8d; font-size:0.8em;">COMMENTAIRE :</label>
                <div class="comment-box">
                    "${feedback.comment || 'L\'utilisateur n\'a pas laissé de commentaire écrit.'}"
                </div>

                <label style="font-weight:bold; color:#7f8c8d; font-size:0.8em;">AUTEUR DU FEEDBACK :</label>
                <div style="margin-top:10px;">${userHtml}</div>
            `;
        }
    </script>
</body>
</html>
