<html lang="fr">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Admin - Détails Utilisateur</title>
    <script type="text/javascript" src="admin_guard.js"></script>

/* --- CONFIGURATION GLOBALE --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
}

:root {
    --bg-dark: #1a1a1a;
    --bg-card: #000000;
    --primary-red: #d32f2f;
    --accent-blue: #3b82f6;
    --text-main: #ffffff;
    --text-dim: #b0b0b0;
    --border: #333333;
}

/* --- SCROLLBAR PERSONNALISÉE --- */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; border: 2px solid var(--bg-dark); }
::-webkit-scrollbar-thumb:hover { background: var(--primary-red); }

body {
    background-color: var(--bg-dark);
    color: var(--text-main);
    line-height: 1.6;
    padding-bottom: 40px;
}

/* --- NAVIGATION --- */
nav {
    background: var(--bg-card);
    padding: 15px 20px !important;
    border-bottom: 2px solid var(--primary-red) !important;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1000;
}

nav a {
    color: var(--text-main);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
    transition: color 0.3s;
}

nav a:hover { color: var(--primary-red); }

/* Logo Intégré */
nav::after {
    content: "";
    width: 50px;
    height: 30px;
    background: url('logo2.png') no-repeat center right;
    background-size: contain;
}

/* --- CONTAINER PRINCIPAL --- */
.detail-container {
    max-width: 1000px !important; /* Élargi pour PC */
    margin: 20px auto !important;
    padding: 0 15px;
}

/* --- HEADER DE PROFIL --- */
.profile-header {
    background: var(--bg-card);
    flex-direction: column; /* Mobile First */
    text-align: center;
    padding: 30px !important;
    border-radius: 12px 12px 0 0;
    border: 1px solid var(--border);
    border-bottom: 3px solid var(--primary-red) !important;
    gap: 20px !important;
}

.profile-pic {
    width: 140px !important;
    height: 140px !important;
    border-radius: 50% !important; /* Cercle parfait */
    object-fit: cover !important; /* No stretch */
    border: 4px solid var(--border) !important;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
    margin: 0 auto;
}

.profile-header h1 {
    font-size: 1.8rem;
    margin-bottom: 10px;
    color: var(--text-main);
}

.profile-header p {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-bottom: 5px;
}

code {
    background: #222;
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--accent-blue);
}

/* --- GRILLE D'INFORMATIONS --- */
.info-grid {
    display: grid !important;
    grid-template-columns: 1fr !important; /* Mobile First: 1 colonne */
    gap: 12px !important;
    margin-top: 0 !important;
    background: var(--bg-card);
    padding: 20px;
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 12px 12px;
}

.info-item {
    background: #0f0f0f !important;
    padding: 15px !important;
    border-radius: 6px !important;
    border-left: 4px solid var(--border) !important;
    transition: border-color 0.3s;
}

.info-item:hover {
    border-left-color: var(--accent-blue) !important;
}

.info-label {
    color: var(--accent-blue) !important;
    font-size: 0.7rem !important;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 5px;
}

.info-value {
    color: var(--text-main) !important;
    font-size: 1rem !important;
    font-weight: 500;
}

/* --- TAGS (Listes) --- */
.tag {
    background: #222 !important;
    color: var(--text-main) !important;
    border: 1px solid #444 !important;
    padding: 4px 12px !important;
    border-radius: 20px !important;
    margin: 4px 4px 0 0 !important;
    font-size: 0.8rem !important;
}

/* --- RESPONSIVITÉ --- */

/* TABLETTE (Min 768px) */
@media (min-width: 768px) {
    .profile-header {
        flex-direction: row;
        text-align: left;
        padding: 40px !important;
    }

    .profile-pic {
        margin: 0;
        width: 160px !important;
        height: 160px !important;
    }

    .info-grid {
        grid-template-columns: repeat(2, 1fr) !important; /* 2 colonnes */
        padding: 30px;
        gap: 20px !important;
    }
}

/* PC (Min 1024px) */
@media (min-width: 1024px) {
    .info-grid {
        grid-template-columns: repeat(3, 1fr) !important; /* 3 colonnes pour les détails */
    }

    .detail-container {
        margin-top: 40px !important;
        box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
}

/* CAS PARTICULIER : Valeurs longues (Emails, IDs) */
.info-value {
    word-break: break-word;
}



    </style>
</head>
<body>

    <nav style="padding: 10px; border-bottom: 1px solid #ccc;">
        <a href="admin-users-list.html">⬅ Retour à la liste</a>
    </nav>

    <div class="detail-container" id="detailContent">
        <p>Chargement des détails...</p>
    </div>

    <script>
        // 1. Extraire l'ID de l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        window.onload = () => {
            if (!userId) {
                document.getElementById('detailContent').innerHTML = "Erreur : Aucun ID spécifié.";
                return;
            }
            fetchUserDetails();
        };

        async function fetchUserDetails() {
            try {
                const response = await fetch(`https://bl-alliance-api.onrender.com/admin/user_full_details?id=${userId}`);
                const data = await response.json();

                if (response.ok) {
                    renderDetails(data);
                } else {
                    document.getElementById('detailContent').innerHTML = `Erreur : ${data.error}`;
                }
            } catch (error) {
                console.error("Erreur:", error);
                document.getElementById('detailContent').innerHTML = "Erreur de connexion au serveur.";
            }
        }

        function renderDetails(user) {
            const container = document.getElementById('detailContent');
            
            // Gestion de la photo (fallback sur l'avatar par défaut si vide)
            const photoUrl = user.url_profil_img || user.photo_url || 'https://res.cloudinary.com/dljaip15q/image/upload/v1774942117/default-avatar_xgspk7.png';

            let html = `
                <div class="profile-header">
                    <img src="${photoUrl}" class="profile-pic" alt="Photo de profil">
                    <div>
                        <h1>${user.full_name || 'Sans Nom'}</h1>
                        <p>ID: <code>${user.id}</code></p>
                        <p style="display:none;">Statut Paiement : <strong>${user.is_paid ? '✅ PAYÉ' : '❌ NON PAYÉ'}</strong></p>
                    </div>
                </div>

                <div class="info-grid">
            `;

            // Boucle sur les clés de l'objet utilisateur pour tout afficher dynamiquement
            for (const [key, value] of Object.entries(user)) {
                // On saute l'ID et l'image car déjà affichés en haut
                if (key === 'id' || key === 'url_profil_img' || key === 'photo_url') continue;

                let displayValue = value;

                // Formatage si c'est une liste (ARRAY)
                if (Array.isArray(value)) {
                    displayValue = value.map(item => `<span class="tag">${item}</span>`).join('') || 'Vide';
                } 
                // Formatage si c'est un booléen
                else if (typeof value === 'boolean') {
                    displayValue = value ? 'Oui' : 'Non';
                }
                // Formatage si c'est vide
                else if (value === null || value === "") {
                    displayValue = '<span style="color:#ccc">Non renseigné</span>';
                }

                html += `
                    <div class="info-item">
                        <span class="info-label">${key.replace(/_/g, ' ')}</span>
                        <span class="info-value">${displayValue}</span>
                    </div>
                `;
            }

            html += `</div>`;
            container.innerHTML = html;
        }
    </script>
</body>
</html>
