/* --- CONFIGURATION GLOBALE & RESET --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', 'Segoe UI', sans-serif;
}

:root {
    --bg-dark: #1a1a1a;
    --bg-card: #000000;
    --primary-red: #d32f2f;
    --accent-blue: #3b82f6;
    --text-main: #ffffff;
    --text-dim: #b0b0b0;
    --border: #333333;
}

/* --- SCROLLBAR PROFESSIONNELLE --- */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; border: 2px solid var(--bg-dark); }
::-webkit-scrollbar-thumb:hover { background: var(--primary-red); }

body {
    background-color: var(--bg-dark) !important;
    color: var(--text-main);
    line-height: 1.6;
}

/* --- NAVIGATION --- */
nav {
    background: var(--bg-card) !important;
    padding: 5px 20px !important;
    border-bottom: 2px solid var(--primary-red) !important;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1000;
}

nav a {
    color: var(--text-main) !important;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
}

/* Intégration du Logo */
nav::after {
    content: "";
    width: 45px;
    height: 35px;
    background: url('logo2.png') no-repeat center;
    background-size: contain;
}

nav button {
    background: #222;
    color: #fff;
    border: 1px solid #444;
    padding: 8px 12px;
    border-radius: 4px;
    cursor: pointer;
}

/* --- ZONE DE RECHERCHE (CALIBRÉE) --- */
.search-section {
    background: linear-gradient(135deg, #000 0%, #1a1a1a 100%) !important;
    padding: 10px 20px !important;
    border-bottom: 1px solid var(--border);
}

.search-section h2 {
    font-size: 1.4rem;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: center;
}

.search-section .container > div {
    flex-direction: column; /* Mobile First */
    gap: 15px !important;
}

.search-section select, 
.search-section input {
    width: 100%;
    padding: 12px !important;
    background: #000 !important;
    border: 1px solid var(--border) !important;
    color: white !important;
    border-radius: 6px !important;
}

.search-section button {
    background: var(--accent-blue) !important;
    color: white !important;
    font-weight: bold;
    border-radius: 6px !important;
    padding: 12px !important;
    transition: 0.3s ease;
}

/* --- LISTE DES FEEDBACKS --- */
.container {
    max-width: 1000px !important;
    margin: 20px auto !important;
}

.fb-card {
    background: var(--bg-card) !important;
    border: 1px solid var(--border) !important;
    padding: 20px !important;
    margin-bottom: 15px !important;
    border-radius: 10px !important;
    flex-direction: column; /* Mobile First */
    align-items: flex-start !important;
    gap: 15px;
    transition: transform 0.2s;
}

.fb-card:hover {
    border-color: var(--accent-blue) !important;
}

.rating {
    color: #f1c40f !important; /* Jaune préservé pour les étoiles */
    font-size: 1.1rem !important;
    letter-spacing: 2px;
}

.btn-details {
    width: 100%; /* Mobile First */
    background: transparent !important;
    border: 1px solid var(--accent-blue) !important;
    color: var(--accent-blue) !important;
    padding: 10px 20px !important;
    font-weight: bold;
    border-radius: 6px !important;
    transition: 0.3s;
}

.btn-details:hover {
    background: var(--accent-blue) !important;
    color: #fff !important;
}

/* --- ÉTAT DE CHARGEMENT --- */
.loading {
    color: var(--accent-blue) !important;
    font-style: normal !important;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
}

/* --- RESPONSIVITÉ (TABLETTE & PC) --- */

@media (min-width: 768px) {
    /* Recherche sur une ligne */
    .search-section .container > div {
        flex-direction: row;
    }
    
    .search-section select { width: 200px; }
    
    /* Cartes sur une ligne */
    .fb-card {
        flex-direction: row;
        justify-content: space-between !important;
        align-items: center !important;
    }

    .btn-details {
        width: auto !important;
    }

    .search-section h2 {
        text-align: left;
    }
}

@media (min-width: 1024px) {
    .container {
        padding: 0 !important;
    }
    
    .fb-card {
        padding: 25px !important;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3) !important;
    }
}

/* --- LOGIQUE IMAGES (Si ajoutées dynamiquement) --- */
.user-avatar-feedback {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    object-fit: cover !important; /* No stretch */
    border: 2px solid var(--border);
}        
    </style>
</head>
<body>

    <nav>
        <a href="bl-admin-landing.html" style="text-decoration:none; color:#16a085; font-weight:bold;">⬅ Retour</a>
        <button onclick="location.reload()" style="padding: 8px 15px; cursor: pointer;">🔄 Rafraîchir</button>
    </nav>

    <div class="search-section">
        <div class="container">
            <h2>Feedbacks</h2>
            <div style="display:flex; gap:10px;">
                <select id="searchType" style="padding:10px; border-radius:5px; border:none;">
                    <option value="name">Nom de l'utilisateur</option>
                    <option value="id">ID Utilisateur</option>
                </select>
                <input type="text" id="searchInput" placeholder="Rechercher un feedback..." style="flex:1; padding:10px; border-radius:5px; border:none;">
                <button onclick="performSearch()" style="padding:10px 25px; border-radius:5px; border:none; background:#2c3e50; color:white; cursor:pointer;">🔍 Rechercher</button>
            </div>
        </div>
    </div>

    <div class="container" id="feedbackList"></div>
    <div id="loadingIndicator" class="loading">Chargement des avis ...</div>

    <script>
        let currentPage = 0;
        let isFetching = false;
        let hasMore = true;

        window.onload = () => fetchFeedbacks();

        async function fetchFeedbacks(reset = false) {
            if (isFetching || (!hasMore && !reset)) return;
            isFetching = true;
            if (reset) { currentPage = 0; hasMore = true; document.getElementById('feedbackList').innerHTML = ""; }
            
            document.getElementById('loadingIndicator').style.display = 'block';
            const q = document.getElementById('searchInput').value;
            const type = document.getElementById('searchType').value;

            try {
                const res = await fetch(`https://bl-alliance-api.onrender.com/admin/get_feedbacks?page=${currentPage}&query=${q}&search_type=${type}`);
                const data = await res.json();
                
                renderFeedbacks(data.feedbacks);
                hasMore = data.has_more;
                currentPage++;
            } catch (e) { console.error(e); }
            finally {
                isFetching = false;
                document.getElementById('loadingIndicator').style.display = 'none';
            }
        }

        function renderFeedbacks(feedbacks) {
            const list = document.getElementById('feedbackList');
            feedbacks.forEach(f => {
                const stars = "★".repeat(f.rating) + "☆".repeat(5 - f.rating);
                const html = `
                    <div class="fb-card">
                        <div>
                            <div style="font-size:0.8em; color:#888;">${new Date(f.created_at).toLocaleDateString()}</div>
                            <div style="font-weight:bold; font-size:1.1em;">${f.user_name}</div>
                            <div style="color:#555; margin-top:5px;">Sujet: ${f.subject}</div>
                        </div>
                        <div style="text-align:right;">
                            <div class="rating">${stars}</div>
                            <button class="btn-details" style="margin-top:10px;" onclick="location.href='admin-feedbacks-details.html?id=${f.id}'">Voir détails</button>
                        </div>
                    </div>`;
                list.insertAdjacentHTML('beforeend', html);
            });
        }

        function performSearch() { fetchFeedbacks(true); }

        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 100) {
                fetchFeedbacks();
            }
        };
    </script>
</body>
</html>
