<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue | BL Alliance</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .main-card {
            background-color: #141414;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #333;
            width: 350px;
        }
        h1 { color: #D32F2F; margin-bottom: 30px; }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }
        .btn-primary { background-color: #D32F2F; color: white; }
        .btn-outline { background-color: transparent; color: #D32F2F; border: 1px solid #D32F2F; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>BL Alliance</h1>
        <p>Trouvez votre partenaire idéal en RDC.</p>
        
        <a href="login.html" class="btn btn-primary">Se connecter</a>
        <a href="signup.html" class="btn btn-outline">Créer un compte</a>
    </div>

</body>
</html>
